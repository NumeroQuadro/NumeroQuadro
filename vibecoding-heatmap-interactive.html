<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dmitriy's Vibecoding Graph</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #24292f;
      --muted: #57606a;
      --border: #d0d7de;
      --panel: #f6f8fa;
      --empty: #ebedf0;
      --l1: #9be9a8;
      --l2: #40c463;
      --l3: #30a14e;
      --l4: #216e39;
      --blue: #316dca;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #f0f6fc;
        --muted: #8b949e;
        --border: #30363d;
        --panel: #161b22;
        --empty: #161b22;
        --l1: #0e4429;
        --l2: #006d32;
        --l3: #26a641;
        --l4: #39d353;
        --blue: #1f6feb;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.1;
      letter-spacing: 0;
    }
    .settings { color: var(--muted); font-size: 15px; white-space: nowrap; }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 164px;
      gap: 18px;
      align-items: start;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 22px 28px 20px;
      overflow-x: auto;
      background: var(--bg);
    }
    .months {
      display: grid;
      grid-template-columns: repeat(53, 11px);
      column-gap: 4px;
      margin-left: 42px;
      margin-bottom: 8px;
      min-width: 795px;
      height: 20px;
      color: var(--fg);
    }
    .month-label { grid-row: 1; font-size: 15px; }
    .gridline { display: flex; gap: 10px; align-items: flex-start; }
    .weekdays {
      display: grid;
      grid-template-rows: repeat(7, 11px);
      row-gap: 4px;
      width: 32px;
      flex: 0 0 32px;
      color: var(--fg);
      font-size: 15px;
    }
    .weekday { align-self: center; }
    .graph {
      display: grid;
      grid-template-columns: repeat(53, 11px);
      grid-template-rows: repeat(7, 11px);
      gap: 4px;
      min-width: 795px;
    }
    .day {
      width: 11px;
      height: 11px;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0;
      background: var(--empty);
      cursor: pointer;
      transition: transform 120ms ease, outline-color 120ms ease;
    }
    .day[disabled] { cursor: default; opacity: 0; }
    .day:not([disabled]):hover,
    .day:not([disabled]):focus-visible {
      transform: scale(1.3);
      outline: 2px solid var(--blue);
      outline-offset: 1px;
      position: relative;
      z-index: 2;
    }
    .l0 { background: var(--empty); }
    .l1 { background: var(--l1); border-color: transparent; }
    .l2 { background: var(--l2); border-color: transparent; }
    .l3 { background: var(--l3); border-color: transparent; }
    .l4 { background: var(--l4); border-color: transparent; }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      min-width: 795px;
      margin: 18px 0 0 42px;
      color: var(--muted);
      font-size: 15px;
    }
    .legend { display: flex; align-items: center; gap: 7px; white-space: nowrap; }
    .legend-box { width: 11px; height: 11px; border-radius: 3px; border: 1px solid var(--border); }
    .rail { display: grid; gap: 18px; }
    .year { padding: 10px 18px; border-radius: 7px; color: var(--muted); font-size: 18px; }
    .year.active { background: var(--blue); color: #fff; font-weight: 600; }
    .details {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 18px;
    }
    .panel {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      padding: 18px;
      min-height: 176px;
    }
    .panel h2 { margin: 0 0 10px; font-size: 18px; }
    .diagnosis { margin: 0 0 12px; color: var(--muted); font-size: 15px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .stat { border-top: 1px solid var(--border); padding-top: 10px; min-width: 0; }
    .stat strong { display: block; font-size: 20px; line-height: 1.1; }
    .stat span { color: var(--muted); font-size: 12px; }
    .lists { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .list h3 { margin: 0 0 8px; font-size: 13px; color: var(--muted); font-weight: 600; }
    .list div { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin: 4px 0; }
    .controls {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .control {
      border: 1px solid var(--border);
      color: var(--fg);
      background: var(--bg);
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
      font: inherit;
    }
    .control[aria-pressed="true"] { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue) inset; }
    @media (max-width: 860px) {
      main { padding: 16px; }
      .layout, .details { grid-template-columns: 1fr; }
      .rail { display: none; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .lists { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <h1><span id="activeDays"></span> vibe-coding days in 2026</h1>
      <div class="settings">Vibecoding settings⌄</div>
    </div>
    <section class="layout" aria-label="Vibecoding contribution graph">
      <div class="card">
        <div id="months" class="months" aria-hidden="true"></div>
        <div class="gridline">
          <div class="weekdays" aria-hidden="true">
            <span></span><span class="weekday">Mon</span><span></span><span class="weekday">Wed</span><span></span><span class="weekday">Fri</span><span></span>
          </div>
          <div id="graph" class="graph"></div>
        </div>
        <div class="card-footer">
          <span id="summary"></span>
          <span class="legend">Less <span class="legend-box l0"></span><span class="legend-box l1"></span><span class="legend-box l2"></span><span class="legend-box l3"></span><span class="legend-box l4"></span> More</span>
        </div>
      </div>
      <aside class="rail" aria-label="Year selector decoration">
        <div class="year active">2026</div><div class="year">2025</div><div class="year">2024</div><div class="year">2023</div><div class="year">2022</div>
      </aside>
    </section>
    <div class="controls" aria-label="Intensity metric">
      <button class="control" data-mode="score" aria-pressed="true">vibe score</button>
      <button class="control" data-mode="sessions" aria-pressed="false">sessions</button>
      <button class="control" data-mode="prompts" aria-pressed="false">prompts</button>
      <button class="control" data-mode="tools" aria-pressed="false">tool calls</button>
      <button class="control" data-mode="tokens" aria-pressed="false">tokens</button>
    </div>
    <section class="details" aria-live="polite">
      <div class="panel">
        <h2 id="detailTitle">Pick a square</h2>
        <p id="diagnosis" class="diagnosis">Click a green day to inspect the local AI weather report.</p>
        <div class="stats">
          <div class="stat"><strong id="sSessions">0</strong><span>sessions</span></div>
          <div class="stat"><strong id="sPrompts">0</strong><span>prompts</span></div>
          <div class="stat"><strong id="sTools">0</strong><span>tool calls</span></div>
          <div class="stat"><strong id="sTokens">0</strong><span>tokens</span></div>
        </div>
      </div>
      <div class="panel lists">
        <div class="list"><h3>Homes</h3><div id="homes">-</div></div>
        <div class="list"><h3>Tools</h3><div id="tools">-</div></div>
        <div class="list"><h3>Workspaces</h3><div id="workspaces">-</div></div>
      </div>
    </section>
  </main>

  <script>
    const data = JSON.parse(document.getElementById('vibe-data').textContent);
    const graph = document.getElementById('graph');
    const months = document.getElementById('months');
    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const fmt = new Intl.NumberFormat('en-US');
    const metricNames = { score: 'vibe score', sessions: 'sessions', prompts: 'prompts', tools: 'tool calls', tokens: 'tokens' };
    let mode = 'score';

    function shortTokens(n) {
      if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
      if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return String(n);
    }
    function escapeText(value) {
      return String(value).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function levelsFor(metric) {
      if (metric === 'score') return data.thresholds;
      const values = data.days.map(d => d[metric]).filter(Boolean).sort((a,b) => a-b);
      if (!values.length) return [0,0,0,0];
      return [0.2,0.4,0.65,0.85].map(p => values[Math.max(0, Math.min(values.length - 1, Math.round((values.length - 1) * p)))]);
    }
    function levelFor(day, metric) {
      const value = day[metric] || 0;
      if (!day.inRange || value <= 0) return 0;
      const t = levelsFor(metric);
      if (value <= t[0]) return 1;
      if (value <= t[1]) return 2;
      if (value <= t[2]) return 3;
      return 4;
    }
    function diagnosis(day) {
      if (!day.sessions) return 'No recorded vibe-coding. Either peace, grass, or a stealth tab somewhere.';
      if (day.tools > 2500) return 'Industrial-grade vibecoding. The terminal probably needed a chair.';
      if (day.tokens > 100000000) return 'Context window buffet. Several models left this day changed.';
      if (day.prompts > 100) return 'Prompt storm. Many tiny negotiations with the machine.';
      if (day.sessions > 20) return 'Session confetti. Lots of new threads, lots of parallel little quests.';
      if (day.tools > 500) return 'Tool-heavy day. Very much hands-on keyboard, except the keyboard had assistants.';
      return 'Respectable green square. A normal amount of summoning the machine.';
    }
    function list(items) {
      if (!items || !items.length) return '-';
      return items.map(item => `<div title="${escapeText(item.name)}">${escapeText(item.name)} <span class="muted">${fmt.format(item.count)}</span></div>`).join('');
    }
    function show(day) {
      document.getElementById('detailTitle').textContent = day.date;
      document.getElementById('diagnosis').textContent = diagnosis(day);
      document.getElementById('sSessions').textContent = fmt.format(day.sessions);
      document.getElementById('sPrompts').textContent = fmt.format(day.prompts);
      document.getElementById('sTools').textContent = fmt.format(day.tools);
      document.getElementById('sTokens').textContent = shortTokens(day.tokens);
      document.getElementById('homes').innerHTML = list(day.toolHomes);
      document.getElementById('tools').innerHTML = list(day.topTools);
      document.getElementById('workspaces').innerHTML = list(day.workspaces);
    }
    function buildMonths() {
      const starts = ['2025-07-01','2025-08-01','2025-09-01','2025-10-01','2025-11-01','2025-12-01','2026-01-01','2026-02-01','2026-03-01','2026-04-01','2026-05-01','2026-06-01'];
      const first = new Date(data.days[0].date + 'T00:00:00Z');
      for (const iso of starts) {
        const d = new Date(iso + 'T00:00:00Z');
        const col = Math.floor((d - first) / 86400000 / 7) + 1;
        const label = document.createElement('span');
        label.className = 'month-label';
        label.style.gridColumn = col;
        label.textContent = monthNames[d.getUTCMonth()];
        months.appendChild(label);
      }
    }
    function render() {
      graph.innerHTML = '';
      for (const day of data.days) {
        const button = document.createElement('button');
        button.className = `day l${levelFor(day, mode)}`;
        button.style.gridColumn = day.col + 1;
        button.style.gridRow = day.row + 1;
        button.type = 'button';
        button.disabled = !day.inRange;
        button.title = day.sessions ? `${day.date}: ${fmt.format(day.sessions)} sessions, ${fmt.format(day.prompts)} prompts, ${fmt.format(day.tools)} tool calls, ${shortTokens(day.tokens)} tokens` : `${day.date}: no recorded vibe-coding`;
        button.setAttribute('aria-label', button.title);
        button.addEventListener('click', () => show(day));
        graph.appendChild(button);
      }
    }
    document.getElementById('activeDays').textContent = fmt.format(data.summary.activeDays);
    document.getElementById('summary').textContent = `${fmt.format(data.summary.sessions)} sessions - ${fmt.format(data.summary.prompts)} prompts - ${fmt.format(data.summary.toolCalls)} tool calls - ${shortTokens(data.summary.tokens)} tokens`;
    document.querySelectorAll('.control').forEach(button => {
      button.addEventListener('click', () => {
        mode = button.dataset.mode;
        document.querySelectorAll('.control').forEach(b => b.setAttribute('aria-pressed', String(b === button)));
        render();
        document.getElementById('diagnosis').textContent = `Recolored by ${metricNames[mode]}. Click any square to interrogate it politely.`;
      });
    });
    buildMonths();
    render();
    show(data.days.find(d => d.date === data.summary.peakDate) || data.days.find(d => d.sessions));
  </script>
